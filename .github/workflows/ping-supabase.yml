name: Despertador do Supabase

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fazendo uma requisição para o banco de dados
        env:
          # URL direta (como é texto puro, fica entre aspas, SEM as chaves do GitHub)
          URL: "https://vyjajsgmgdtkmojpwpuf.supabase.co"
          # KEY protegida (aqui sim usamos as chaves, pois ele vai buscar lá nos Secrets)
          KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          curl -X GET "$URL/rest/v1/produtos?select=id&limit=1" \
          -H "apikey: $KEY" \
          -H "Authorization: Bearer $KEY"