name: Despertador do Supabase

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fazendo uma requisição para o banco de dados
        # Puxa os segredos do GitHub e transforma em variáveis locais
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        # Usa as variáveis usando aspas duplas (para o Linux entender)
        run: |
          curl -X GET "$URL/rest/v1/produtos?select=id&limit=1" \
          -H "apikey: $KEY" \
          -H "Authorization: Bearer $KEY"